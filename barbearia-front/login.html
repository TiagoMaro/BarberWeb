<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fauget Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/login.css">
   
</head>
<body>
    <header id="header-componente"></header>

    <main class="login-wrapper">
        <div class="login-card">
            <h2>Login</h2>
            <form id="formLogin">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="••••••••">
                    <div style="text-align: left;">
                        <a href="#" class="forgot-password">Esqueceu sua senha?</a>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
        </div>
    </main>

    <footer class="footer" id="footer-componente"></footer>
    <script src="./js/components/footer.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/components/header.js"></script>
</body>
</html>
