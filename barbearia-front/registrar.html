<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Fauget Barber</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/registrar.css">

</head>

<body>
    <header id="header-componente"></header>

    <main class="register-wrapper">
        <div class="register-card">
            <h2>Cadastrar</h2>
            <form id="formRegistrar">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="nome" placeholder="Nome">
                    </div>
                    <div class="form-group">
                        <label>Sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="Sobrenome">
                    </div>
                    <div class="form-group full">
                        <label>Telefone</label>
                        <input type="text" id="telefone" placeholder="DDD + Número">
                    </div>
                </div>

                <div class="section-title">E-mail</div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="E-mail">
                    </div>
                    <div class="form-group full">
                        <label>Senha</label>
                        <input type="password" id="senha" placeholder="Senha">
                    </div>
                    <div class="form-group full">
                        <label>Confirme sua senha</label>
                        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-col">
            <p><strong>A excelência em cada detalhe.</strong></p>
            <br>
            <p>Políticas de Privacidade.<br>Todos Termos Reservados.</p>
        </div>

        <div class="footer-col footer-logo">
            <div class="logo-text">Fauget<br>Barber</div>
        </div>

        <div class="footer-col right-aligned-content">
            <div class="info-block">
                <p><strong>Redes sociais.</strong></p>
                <div class="social-icons">
                    <a href="https://instagram.com" target="_blank" title="Instagram"><i
                            class="fa-brands fa-instagram"></i></a>
                    <a href="https://wa.me/seunumeroaqui" target="_blank" title="WhatsApp"><i
                            class="fa-brands fa-whatsapp"></i></a>
                    <a href="https://facebook.com" target="_blank" title="Facebook"><i
                            class="fa-brands fa-facebook-f"></i></a>
                </div>
                <p><strong>Localização.</strong></p>
                <p>R. Konrad Adenauer, 442 - Tarumã, Curitiba - PR, 82820-540</p>
            </div>
        </div>
    </footer>
    <script src="./js/api.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/components/registrar.js"></script>
</body>

</html>
