<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Fauget Barber</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/registrar.css">

</head>

<body>
    <header id="header-componente"></header>

    <main class="register-wrapper">
        <div class="register-card">
            <h2>Cadastrar</h2>
            <form id="formRegistrar">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="nome" placeholder="Nome">
                    </div>
                    <div class="form-group">
                        <label>Sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="Sobrenome">
                    </div>
                    <div class="form-group full">
                        <label>Telefone</label>
                        <input type="text" id="telefone" placeholder="DDD + Número">
                    </div>
                </div>

                <div class="section-title">E-mail</div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="E-mail">
                    </div>
                    <div class="form-group full">
                        <label>Senha</label>
                        <input type="password" id="senha" placeholder="Senha">
                    </div>
                    <div class="form-group full">
                        <label>Confirme sua senha</label>
                        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>
        </div>
    </main>

    <footer class="footer" id="footer-componente"></footer>
    <script src="./js/components/footer.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/components/registrar.js"></script>
</body>

</html>
