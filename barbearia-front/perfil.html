<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Fauget Barber</title>
    <link rel="stylesheet" href="./css/agendar.css"> <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header id="header-componente"></header>

    <main class="booking-container" style="max-width: 600px; margin: 40px auto; padding: 20px;">
        <div class="section-title-bar">Meu Perfil</div>

        <div id="secaoGerente" style="display: none; background-color: #433831; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
            <h3 style="color: #fff; margin-top: 0;">Painel Administrativo</h3>
            <p style="color: #ddd; font-size: 0.9em;">Você está logado como Gerente. Acesse as configurações globais do sistema.</p>
            <button onclick="window.location.href='painel.html'" style="background-color: #fff; color: #433831; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px;">
                <i class="fas fa-cogs"></i> Abrir Painel de Controle
            </button>
        </div>

        <form id="formPerfil" style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ccc;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Nome Completo</label>
                <input type="text" id="nomeCompleto" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">E-mail</label>
                <input type="email" id="email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p style="font-size: 0.85em; color: #666; margin-top: 0;">Preencha os campos abaixo apenas se desejar alterar sua senha atual.</p>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Nova Senha</label>
                <input type="password" id="novaSenha" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Confirmar Nova Senha</label>
                <input type="password" id="confirmarNovaSenha" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <button type="submit" id="btnSalvarPerfil" style="width: 100%; background-color: #433831; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 600; cursor: pointer;">
                Salvar Alterações
            </button>
        </form>
    </main>

    <footer class="footer" id="footer-componente"></footer>
    
    <script src="./js/components/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/perfil.js"></script>
</body>
</html>
