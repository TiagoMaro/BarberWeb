<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar - Fauget Barber</title>
    <link rel="stylesheet" href="./css/agendar.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <header id="header-componente"></header>

    <main class="booking-container">

        <div class="top-sections">
            <section class="section-box">
                <div class="section-title-bar">Funcionários</div>
                <div class="options-list" id="funcionarios-list">
                    <p style="text-align:center; width:100%; font-size:0.9em; padding: 20px 0;">Carregando barbeiros...</p>
                </div>
            </section>

            <section class="section-box">
                <div class="section-title-bar">Serviços Oferecidos</div>
                <div class="options-list" id="servicos-list">
                    <p style="text-align:center; width:100%; font-size:0.9em; padding: 20px 0;">Carregando serviços...</p>
                </div>
            </section>
        </div>

        <div class="agenda-section">
            <div class="section-title-bar" style="background-color: #433831;">Agenda</div>

            <div class="agenda-grid">
                <div class="agenda-box">
                    <div class="calendar-header">
                        <button id="prev-month" style="visibility: hidden;"><i class="fas fa-chevron-left"></i></button>
                        
                        <span id="calendar-month-year"></span>
                        
                        <button id="next-month" style="visibility: hidden;"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="calendar-days">
                        <div>Dom</div>
                        <div>Seg</div>
                        <div>Ter</div>
                        <div>Qua</div>
                        <div>Qui</div>
                        <div>Sex</div>
                        <div>Sáb</div>
                    </div>
                    <div class="calendar-dates" id="calendar-dates">
                    </div>
                </div>

                <div class="agenda-box">
                    <div class="hours-list" id="hours-container">
                        <div class="hour-item" data-time="09:00">09:00</div>
                        <div class="hour-item" data-time="10:00">10:00</div>
                        <div class="hour-item" data-time="11:00">11:00</div>
                        <div class="hour-item" data-time="13:00">13:00</div>
                        <div class="hour-item" data-time="14:00">14:00</div>
                        <div class="hour-item" data-time="15:00">15:00</div>
                        <div class="hour-item" data-time="16:00">16:00</div>
                        <div class="hour-item" data-time="17:00">17:00</div>
                    </div>
                </div>

                <div class="agenda-box confirmation-box">
                    <h3>Confirmação</h3>
                    <div class="summary-text" id="summary-text">
                        <p>Selecione os dados para visualizar o resumo do agendamento.</p>
                    </div>
                    <button class="btn-confirm" id="btn-submit-booking">Confirmar</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="footer" id="footer-componente"></footer>
    <script src="./js/components/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/agendar.js"></script>
</body>

</html>
