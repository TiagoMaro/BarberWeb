<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Fauget Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Reaproveitando os estilos da Barbearia para manter o padrão */
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: #a39b8f;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        .navbar {
            width: 100%;
            background-color: #d4c48a; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            border-radius: 12px;
            margin-bottom: 3vh;
        }
        .nav-group { display: flex; gap: 4px; }
        .nav-link {
            background-color: #433831;
            padding: 12px 25px;
            color: #d4c48a;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-link:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-left { clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); padding-left: 30px; }
        .btn-right { clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); padding-right: 30px; }
        .logo-text { font-family: 'Cinzel', serif; color: #433831; font-size: 26px; line-height: 1; text-align: center; text-transform: uppercase; }

        .register-wrapper { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px 0; 
            margin-bottom: 5vh;
        }
        
        .register-card {
            background-color: #d9d9d9;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .register-card h2 { margin-bottom: 25px; color: #333; font-weight: 600; }
        .section-title { font-size: 18px; color: #433831; margin: 25px 0 15px; font-weight: 600; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .form-group.full { grid-column: span 2; }
        
        .form-group label { font-size: 11px; font-weight: 600; color: #433831; margin-bottom: 5px; margin-left: 10px; }
        .form-group input {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background-color: #4d5154;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            border-radius: 50px;
            border: none;
            background-color: #433831;
            color: #d4c48a;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { filter: brightness(1.3); }

        /* FOOTER */
        .footer {
            background-color: #d4c48a;
            border-radius: 12px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            gap: 20px;
            margin-top: auto;
        }

        .footer-col { font-size: 14px; color: #433831; }
        .footer-logo { display: flex; justify-content: center; }

        .social-icons {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            justify-content: center;
        }

        .social-icons a {
            text-decoration: none;
            color: #d4c48a;
            background-color: #433831;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background-color: #ffffff;
            color: #433831;
            transform: translateY(-3px);
        }

        .right-aligned-content { display: flex; justify-content: flex-end; }
        .info-block { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }

        @media (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
            .navbar { flex-direction: column; gap: 15px; padding: 20px; }
            .footer { grid-template-columns: 1fr; text-align: center; }
            .right-aligned-content { justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-group">
            <a href="index.html" class="nav-link btn-left">HOME</a>
            <a href="agendar.html" class="nav-link btn-right">AGENDAR</a>
        </div>
        <div class="logo-text">Fauget<br>Barber</div>
        <div class="nav-group">
            <a href="login.html" class="nav-link btn-left">ENTRAR</a>
            <a href="registrar.html" class="nav-link btn-right">REGISTRAR</a>
        </div>
    </header>

    <main class="register-wrapper">
        <div class="register-card">
            <h2>Cadastrar</h2>
            <form>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" placeholder="Nome">
                    </div>
                    <div class="form-group">
                        <label>Sobrenome</label>
                        <input type="text" placeholder="Sobrenome">
                    </div>
                    <div class="form-group full">
                        <label>Telefone</label>
                        <input type="text" placeholder="DDD + Número">
                    </div>
                </div>

                <div class="section-title">E-mail</div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>E-mail</label>
                        <input type="email" placeholder="E-mail">
                    </div>
                    <div class="form-group full">
                        <label>Senha</label>
                        <input type="password" placeholder="Senha">
                    </div>
                    <div class="form-group full">
                        <label>Confirme sua senha</label>
                        <input type="password" placeholder="Confirmar senha">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-col">
            <p><strong>A excelência em cada detalhe.</strong></p>
            <br>
            <p>Políticas de Privacidade.<br>Todos Termos Reservados.</p>
        </div>
        
        <div class="footer-col footer-logo">
            <div class="logo-text">Fauget<br>Barber</div>
        </div>
        
        <div class="footer-col right-aligned-content">
            <div class="info-block">
                <p><strong>Redes sociais.</strong></p>
                <div class="social-icons">
                    <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://wa.me/seunumeroaqui" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <p><strong>Localização.</strong></p>
                <p>R. Konrad Adenauer, 442 - Tarumã, Curitiba - PR, 82820-540</p>
            </div>
        </div>
    </footer>
</body>
</html>
